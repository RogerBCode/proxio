name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Opt-in to Node 24 as requested
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      # Use the official setup-uv action
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          
      # uv can manage Python versions directly
      - name: Install Python
        run: uv python install 3.12

      - name: Install project and dev dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest --cov=proxio --cov-report=term