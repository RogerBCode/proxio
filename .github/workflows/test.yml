name: Test

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.x'
      - name: Install uv
        run: pip install uv
      - name: Install project and dev dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest --cov=proxio --cov-report=term
